name: Build and Publish Docker Image

on:
  # Build on every push to main
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  # Run the CLRMamePro version check on a schedule (daily at 6 AM UTC)
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-for-update:
    name: Check if CLRMamePro has a new version
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version_check.outputs.should_build }}
      new_version: ${{ steps.version_check.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Fetch latest CLRMamePro version
        id: version_check
        run: |
          # Scrape the latest 64-bit zip filename from the CLRMamePro site
          LATEST_FILE=$(curl -fsSL https://mamedev.emulab.it/clrmamepro/ \
            | sed -n 's/.*href="\([^"]*\)".*/\1/p' \
            | grep -i binaries \
            | grep -i cmp \
            | grep -i _64.zip \
            | sort -r \
            | head -1)

          NEW_VERSION=$(basename --suffix=.zip "$LATEST_FILE" | cut -d '_' -f 1)
          echo "Latest CLRMamePro version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Check if we have a record of the last built version
          if [ -f .last_built_version ]; then
            LAST_VERSION=$(cat .last_built_version)
            echo "Last built version: $LAST_VERSION"
            if [ "$NEW_VERSION" = "$LAST_VERSION" ]; then
              echo "No new CLRMamePro version. Skipping build."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "New version detected! Will build."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No version record found. Will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: check-for-update
    # Always build on push to main; on schedule, only build if new version found
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.check-for-update.outputs.should_build == 'true'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.check-for-update.outputs.new_version }},enable=${{ needs.check-for-update.outputs.new_version != '' }}
            type=sha,prefix=git-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build for amd64 only (Wine 64-bit; arm support would need additional work)
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record built version
        if: needs.check-for-update.outputs.new_version != ''
        run: |
          echo "${{ needs.check-for-update.outputs.new_version }}" > .last_built_version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_built_version
          git diff --staged --quiet || git commit -m "chore: record built CLRMamePro version ${{ needs.check-for-update.outputs.new_version }}"
          git push
